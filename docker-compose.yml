version: '3.8'

services:
  travelstay-db:
    image: mysql:8.0
    container_name: travelstay-mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: travelstay
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  travelstay-backend:
    build: ./backend
    container_name: travelstay-fastapi-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root_password_123@travelstay-db:3306/travelstay
    depends_on:
      - travelstay-db
    restart: always

  travelstay-frontend:
    build: ./frontend
    container_name: travelstay-vue-frontend
    ports:
      - "80:80"
    depends_on:
      - travelstay-backend
    restart: always

volumes:
  mysql_data: