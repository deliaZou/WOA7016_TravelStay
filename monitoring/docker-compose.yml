version: '3.8'

services:
  # 1. MySQL
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.15.0
    container_name: mysqld-exporter
    command:
      - '--mysqld.address=travelstay-db.couwaczgmvhi.us-east-1.rds.amazonaws.com:3306'
      - '--mysqld.username=admin'
      - '--mysqld.password=TravelStay123!'
    ports:
      - "9104:9104"
    restart: always

  # 2. Prometheus
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  # 3. Grafana
  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # default login: admin/admin
    restart: always

networks:
  monitor-net:
    driver: bridge